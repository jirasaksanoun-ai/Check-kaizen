<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX KAIZEN ONLINE | LINE Secure Gateway</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- LINE LIFF SDK -->
    <script src="https://static.liff.line.me/21/sdk.js"></script>

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc; /* Slate 50 โทนสว่างพรีเมียม */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.04) 0%, transparent 60%),
                linear-gradient(rgba(226, 232, 240, 0.5) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(226, 232, 240, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            min-height: 100vh;
            color: #334155;
        }

        /* Glassmorphic Card Style (Light-Tech 5.0) */
        .liff-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 28px;
            box-shadow: 0 20px 40px -15px rgba(148, 163, 184, 0.15);
        }

        /* 5.0 Breathing Neon Ring Loader */
        .neon-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .neon-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 5px solid transparent;
            border-radius: 50%;
            animation: ring-rotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #6366f1 transparent transparent transparent;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4));
        }
        .neon-ring div:nth-child(1) { animation-delay: -0.45s; }
        .neon-ring div:nth-child(2) { animation-delay: -0.3s; }
        .neon-ring div:nth-child(3) { animation-delay: -0.15s; }
        
        @keyframes ring-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-sm liff-glass p-8 text-center space-y-6 animate-slide-up">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-indigo-500/15 mb-3">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 tracking-tight leading-none">RX KAIZEN</h2>
            <p class="text-[10px] text-indigo-500 font-extrabold tracking-widest uppercase mt-2">LINE Secure Gateway 5.0</p>
        </div>

        <!-- Section: Loading -->
        <div id="loadingSection" class="space-y-6">
            <div class="py-4">
                <div class="neon-ring"><div></div><div></div><div></div><div></div></div>
            </div>
            <div class="space-y-2">
                <p id="statusText" class="text-sm text-slate-600 font-bold tracking-wide">กำลังเชื่อมต่อสิทธิ์ LINE Account...</p>
                <p class="text-[11px] text-slate-400 font-medium">ระบบกำลังตรวจสอบความปลอดภัยและพากลับสู่แดชบอร์ดหลัก</p>
            </div>
        </div>

        <!-- Section: Error / Config Diagnostic Panel (ระบบช่วยดีบั๊กแสดงแนวทางการแก้ไข) -->
        <div id="errorSection" class="hidden text-left space-y-4 bg-rose-50/60 p-5 border border-rose-100 rounded-2xl">
            <div class="flex items-center gap-2 text-rose-600 font-bold text-sm">
                <span class="text-base">🚨</span>
                <span>ตรวจพบข้อผิดพลาดของระบบ</span>
            </div>
            <p id="errorMsgText" class="text-xs text-rose-500 leading-relaxed font-semibold">รายละเอียดของข้อผิดพลาด</p>
            
            <div id="diagnosticGuide" class="text-[11px] text-slate-500 space-y-2 border-t border-rose-100/80 pt-3">
                <p class="font-bold text-slate-700">📌 แนวทางการแก้ไขสำหรับผู้พัฒนา:</p>
                <ul class="list-decimal pl-4 space-y-1.5 leading-relaxed font-medium">
                </ul>
            </div>
        </div>

        <!-- Fallback Action -->
        <div id="fallbackAction" class="hidden pt-2">
            <a id="targetLink" href="#" class="inline-flex w-full items-center justify-center gap-2 px-5 py-3.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white text-xs font-black rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-[1.02] active:scale-95">
                <span>คลิกตรงนี้เพื่อไปต่อทันที</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
            </a>
        </div>
    </div>

    <!-- UI LIFF Javascript Controller -->
    <script>
        // ==========================================
        //  กรุณาแก้ไขข้อมูลการกำหนดค่าที่นี่ (Configurations)
        // ==========================================
        const LIFF_ID = "2009669941-KijLKaRA"; // นำ LIFF ID จาก LINE Developers Console มาใส่ตรงนี้
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzZ6ZRBZQHztwtWGWCvKWO7w_O912P0Rpl46PhlaJwaectrW_YnafTIvtzQfUq0vW1x/exec"; // นำ URL หลังทำการ Deploy Web App ของ Google Sheets มาใส่ตรงนี้

        const statusText = document.getElementById('statusText');
        const fallbackAction = document.getElementById('fallbackAction');
        const targetLink = document.getElementById('targetLink');
        const loadingSection = document.getElementById('loadingSection');
        const errorSection = document.getElementById('errorSection');
        const errorMsgText = document.getElementById('errorMsgText');

        /**
         * เริ่มทำงานการยืนยันตัวตน LINE
         */
        async function initializeLiff() {
            try {
                // ดึงค่า config จาก URL ก่อน (เผื่อใช้ระบบทดสอบ) หรือใช้ค่าคงที่ด้านบน
                const urlParams = new URLSearchParams(window.location.search);
                const activeLiffId = urlParams.get('liffId') || LIFF_ID;
                const activeGasUrl = urlParams.get('gasUrl') || GAS_WEBAPP_URL;

                if (activeLiffId === "YOUR_LINE_LIFF_ID_HERE" || activeGasUrl === "YOUR_GAS_WEBAPP_DEPLOY_URL_HERE") {
                    throw new Error("ยังไม่ได้กำหนดค่าความปลอดภัย LIFF_ID หรือ GAS_WEBAPP_URL กรุณาตรวจสอบโค้ดในไฟล์ redirect.html");
                }

                statusText.textContent = "กำลังเริ่มต้นระบบ LINE SDK...";
                await liff.init({ liffId: activeLiffId });

                // เช็คสถานะการเข้าสู่ระบบในแอป LINE
                if (!liff.isLoggedIn()) {
                    statusText.textContent = "กำลังนำทางไปยืนยันสิทธิ์กับ LINE...";
                    liff.login();
                    return;
                }

                statusText.textContent = "กำลังอ่านข้อมูลผู้ใช้งาน...";
                const profile = await liff.getProfile();
                const userId = profile.userId;

                if (!userId) {
                    throw new Error("ไม่สามารถเรียกดูสิทธิ์ LINE User ID ได้สำเร็จ");
                }

                // ปรับปรุงการต่อพารามิเตอร์แบบปลอดภัยอัจฉริยะ (Smart Parameter Constructor)
                // ตรวจเช็คว่าใน URL แอดเดรสเดิมมีเครื่องหมายคำถาม (?) อยู่แล้วหรือไม่ เพื่อใช้ตัวเชื่อมอย่างถูกต้อง
                const parameterSeparator = activeGasUrl.includes('?') ? '&' : '?';
                const redirectTarget = `${activeGasUrl}${parameterSeparator}uid=${encodeURIComponent(userId)}`;
                
                statusText.textContent = "ยืนยันสิทธิ์เรียบร้อย กำลังเปลี่ยนเส้นทาง...";
                
                // อัปเดตลิงก์ไปยังปุ่มสำรอง
                targetLink.href = redirectTarget;
                
                // บังคับเปลี่ยนทิศทางเบราว์เซอร์
                window.location.replace(redirectTarget);

                // แสดงปุ่ม Fallback ทันทีหลังจากผ่านไป 1.5 วินาที เพื่อให้คลิกเชื่อมต่อเองหากเบราว์เซอร์ของไลน์ทำการบล็อกการนำทางอัตโนมัติ
                setTimeout(() => {
                    fallbackAction.classList.remove('hidden');
                }, 1500);

            } catch (err) {
                console.error(err);
                showError(err.message || err);
            }
        }

        /**
         * แสดงรายละเอียดข้อผิดพลาดด้วย Diagnostic Panel
         */
        function showError(message) {
            loadingSection.classList.add('hidden');
            errorSection.classList.remove('hidden');
            errorMsgText.textContent = message;
        }

        // เริ่มโหลดกระบวนการล็อกอินอัตโนมัติ
        window.addEventListener('load', initializeLiff);
    </script>
</body>
</html>
