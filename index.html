<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX KAIZEN ONLINE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- LINE LIFF SDK -->
    <script src="https://static.liff.line.me/21/sdk.js"></script>

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #030712;
            background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
            min-height: 100vh;
            color: #f3f4f6;
        }

        .liff-glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.25);
            border-radius: 24px;
            box-shadow: 0 0 35px rgba(6, 182, 212, 0.15);
        }

        /* Loading Ring */
        .neon-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .neon-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 5px solid transparent;
            border-radius: 50%;
            animation: ring-rotate 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #06b6d4 transparent transparent transparent;
            filter: drop-shadow(0 0 8px #06b6d4);
        }
        .neon-ring div:nth-child(1) { animation-delay: -0.45s; }
        .neon-ring div:nth-child(2) { animation-delay: -0.3s; }
        .neon-ring div:nth-child(3) { animation-delay: -0.15s; }
        
        @keyframes ring-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-sm liff-glass p-8 text-center space-y-6">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-cyan-500/20 mb-3">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h2 class="text-xl font-black text-white tracking-widest uppercase">RX KAIZEN ONLINE</h2>
            <p class="text-[10px] text-cyan-400 font-bold tracking-widest uppercase mt-0.5">Line Secure Gateway</p>
        </div>

        <!-- Animated Loader -->
        <div class="py-4">
            <div class="neon-ring"><div></div><div></div><div></div><div></div></div>
        </div>

        <!-- Status Message -->
        <div class="space-y-2">
            <p id="statusText" class="text-sm text-slate-300 font-semibold tracking-wide">กำลังเชื่อมต่อ LINE Account ...</p>
            <p class="text-[11px] text-slate-500 font-light">ระบบจะเปลี่ยนเส้นทางไปยังหน้าแอปหลักโดยอัตโนมัติภายในเสี้ยววินาที</p>
        </div>

        <!-- Fallback Action -->
        <div id="fallbackAction" class="hidden pt-4">
            <a id="targetLink" href="#" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white text-xs font-bold rounded-xl shadow-lg transition-transform hover:scale-[1.02] active:scale-95">
                คลิกที่นี่หากไม่มีการเปลี่ยนเส้นทาง
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
            </a>
        </div>
    </div>

    <!-- UI LIFF Javascript Controller -->
    <script>
        // === CONFIGURATIONS (กรุณาแทนที่ค่าด้านล่างนี้ด้วยค่าใช้งานจริงของคุณ) ===
        const LIFF_ID = "YOUR_LINE_LIFF_ID_HERE"; // แทนที่ด้วย LIFF ID ที่ตั้งค่าไว้ใน LINE Developers
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzZ6ZRBZQHztwtWGWCvKWO7w_O912P0Rpl46PhlaJwaectrW_YnafTIvtzQfUq0vW1x/exec"; // แทนที่ด้วย URL Web App ที่ได้จาก Deploy ใน GAS

        const statusText = document.getElementById('statusText');
        const fallbackAction = document.getElementById('fallbackAction');
        const targetLink = document.getElementById('targetLink');

        /**
         * เริ่มการทำงานของ LINE LIFF
         */
        async function initializeLiff() {
            try {
                if (LIFF_ID === "YOUR_LINE_LIFF_ID_HERE" || GAS_WEBAPP_URL === "YOUR_GAS_WEBAPP_DEPLOY_URL_HERE") {
                    throw new Error("ระบบยังตั้งค่า LIFF_ID หรือ Web App URL ไม่สมบูรณ์");
                }

                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    statusText.textContent = "กำลังนำทางไปยืนยันตัวตน LINE...";
                    liff.login();
                    return;
                }

                statusText.textContent = "ดึงข้อมูลบัญชี LINE สำเร็จ...";
                const profile = await liff.getProfile();
                const userId = profile.userId;

                // แนบ Line User ID เป็นพารามิเตอร์ส่งกลับไปยัง GAS Web App หลัก
                const redirectTarget = `${GAS_WEBAPP_URL}?uid=${encodeURIComponent(userId)}`;
                
                statusText.textContent = "ยืนยันสิทธิ์เรียบร้อย กำลังนำเข้าสู่ระบบ...";
                
                // นำผู้ใช้เข้าสู่ระบบหลัก
                targetLink.href = redirectTarget;
                window.location.replace(redirectTarget);

                // หากระบบเบราว์เซอร์บล็อกการย้ายหน้า ให้แสดงปุ่ม fallback
                setTimeout(() => {
                    fallbackAction.classList.remove('hidden');
                }, 1500);

            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span class="text-rose-400">🚨 ข้อผิดพลาด: ${err.message || err}</span>`;
                statusText.classList.add('px-4', 'text-center');
            }
        }

        // เริ่มต้นกระบวนการเมื่อหน้าเว็บพร้อมทำงาน
        window.addEventListener('load', initializeLiff);
    </script>
</body>
</html>
